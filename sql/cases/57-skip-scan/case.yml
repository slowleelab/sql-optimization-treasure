title: 索引跳跃扫描 Skip Scan
category: indexing
difficulty: 2
versions: ["8.0"]
tags: ["Skip Scan", "联合索引", "低基数列", "索引跳跃"]
description: |
  联合索引 (gender, created_at)，gender 只有 2 个值（低基数），查询
  WHERE created_at > '2026-01-01' 跳过前导列 gender。MySQL 5.7 无法使用
  索引，全表扫描；MySQL 8.0 支持 Skip Scan（在 EXPLAIN 中显示
  Using index for skip scan），或改写为 WHERE gender IN ('M','F')
  AND created_at > ... 显式展开。
