title: 缓存穿透与布隆过滤器
category: architecture
difficulty: 3
versions: ["5.7", "8.0"]
tags: ["缓存穿透", "布隆过滤器", "Bloom Filter", "缓存", "架构优化"]
description: |
  恶意请求或爬虫使用不存在的用户 ID 大量查询，缓存和数据库都 miss，
  每次请求都打到数据库，导致数据库连接池耗尽、CPU 飙升。
  布隆过滤器在内存中维护一个位数组，查询前先判断 ID 是否可能存在，
  不存在直接返回，避免无效的数据库查询。本案例用 SQL 模拟布隆过滤器
  的工作原理，展示缓存穿透的危害与防护方案。
