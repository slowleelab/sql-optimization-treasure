# MySQL 5.7
services:
  mysql57:
    image: mysql:5.7
    container_name: sql-treasure-mysql57
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sql_treasure
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-flush-log-at-trx-commit=2
      --sql_mode=NO_ENGINE_SUBSTITUTION
    volumes:
      - mysql57_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

  # MySQL 8.0
  mysql80:
    image: mysql:8.0
    container_name: sql-treasure-mysql80
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sql_treasure
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-flush-log-at-trx-commit=2
      --sql_mode=NO_ENGINE_SUBSTITUTION
    volumes:
      - mysql80_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql57_data:
  mysql80_data:
