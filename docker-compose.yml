# MySQL 5.7 + 8.0 双实例（用于案例对比）
# 公共启动参数（通过 YAML 锚点复用）
x-mysql-common: &mysql-common
  restart: unless-stopped
  init: true
  environment:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: sql_treasure
    TZ: Asia/Shanghai
  command: >
    --character-set-server=utf8mb4
    --collation-server=utf8mb4_unicode_ci
    --innodb-buffer-pool-size=512M
    --innodb-flush-log-at-trx-commit=2
    --sql_mode=NO_ENGINE_SUBSTITUTION
  healthcheck:
    test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
    interval: 5s
    timeout: 5s
    retries: 30

services:
  # MySQL 5.7（端口 3307）
  mysql57:
    <<: *mysql-common
    image: mysql:5.7
    container_name: sql-treasure-mysql57
    ports:
      - "3307:3306"
    volumes:
      - mysql57_data:/var/lib/mysql

  # MySQL 8.0（端口 3308）
  mysql80:
    <<: *mysql-common
    image: mysql:8.0
    container_name: sql-treasure-mysql80
    ports:
      - "3308:3306"
    volumes:
      - mysql80_data:/var/lib/mysql

volumes:
  mysql57_data:
  mysql80_data:
