<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2e"/>
      <stop offset="100%" style="stop-color:#0d1f17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3aa675"/>
      <stop offset="100%" style="stop-color:#2d8559"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo 区域 -->
  <rect x="80" y="70" width="100" height="100" rx="20" fill="#3aa675"/>
  <text x="130" y="138" font-family="monospace" font-size="44" font-weight="bold" fill="white" text-anchor="middle">SQL</text>

  <!-- 标题 -->
  <text x="210" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">SQL Lab</text>

  <!-- 副标题 -->
  <text x="210" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8ec5a8">能跑、能量化对比的 MySQL 优化实战案例集</text>

  <!-- 统计数据卡片 -->
  <rect x="80" y="230" width="220" height="100" rx="12" fill="#1f3328" stroke="#3aa675" stroke-width="2"/>
  <text x="190" y="280" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#3aa675" text-anchor="middle">55</text>
  <text x="190" y="315" font-family="system-ui, sans-serif" font-size="20" fill="#8ec5a8" text-anchor="middle">精选案例</text>

  <rect x="330" y="230" width="220" height="100" rx="12" fill="#1f3328" stroke="#3aa675" stroke-width="2"/>
  <text x="440" y="280" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#3aa675" text-anchor="middle">7</text>
  <text x="440" y="315" font-family="system-ui, sans-serif" font-size="20" fill="#8ec5a8" text-anchor="middle">场景分类</text>

  <rect x="580" y="230" width="220" height="100" rx="12" fill="#1f3328" stroke="#3aa675" stroke-width="2"/>
  <text x="690" y="280" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#3aa675" text-anchor="middle">2</text>
  <text x="690" y="315" font-family="system-ui, sans-serif" font-size="20" fill="#8ec5a8" text-anchor="middle">MySQL 版本</text>

  <rect x="830" y="230" width="220" height="100" rx="12" fill="#1f3328" stroke="#3aa675" stroke-width="2"/>
  <text x="940" y="280" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#3aa675" text-anchor="middle">100%</text>
  <text x="940" y="315" font-family="system-ui, sans-serif" font-size="20" fill="#8ec5a8" text-anchor="middle">可复现</text>

  <!-- 分类标签 -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="22" fill="#6b9d80">索引设计 · 查询改写 · JOIN 优化 · DDL 大表 · 架构优化 · 事务与锁 · 8.0 新特性</text>

  <!-- 特性标签 -->
  <rect x="80" y="440" width="200" height="50" rx="25" fill="#1f3328" stroke="#3aa675" stroke-width="1.5"/>
  <text x="180" y="471" font-family="system-ui, sans-serif" font-size="20" fill="#3aa675" text-anchor="middle">🐳 Docker 一键跑</text>

  <rect x="300" y="440" width="240" height="50" rx="25" fill="#1f3328" stroke="#3aa675" stroke-width="1.5"/>
  <text x="420" y="471" font-family="system-ui, sans-serif" font-size="20" fill="#3aa675" text-anchor="middle">📊 EXPLAIN 量化对比</text>

  <rect x="560" y="440" width="220" height="50" rx="25" fill="#1f3328" stroke="#3aa675" stroke-width="1.5"/>
  <text x="670" y="471" font-family="system-ui, sans-serif" font-size="20" fill="#3aa675" text-anchor="middle">🔢 5.7 + 8.0 双版本</text>

  <!-- 底部渐变线 -->
  <rect x="80" y="540" width="1040" height="4" rx="2" fill="url(#accent)"/>

  <!-- 底部链接 -->
  <text x="80" y="585" font-family="monospace" font-size="20" fill="#6b9d80">github.com/slowleelab/sql-optimization-treasure</text>
</svg>
